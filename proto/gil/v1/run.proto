syntax = "proto3";

package gil.v1;

import "gil/v1/event.proto";
import "google/api/annotations.proto";

option go_package = "github.com/mindungil/gil/proto/gen/gil/v1;gilv1";

service RunService {
  // Start runs the agent loop synchronously and returns the final result.
  // For long-running runs the client may also Tail to observe progress.
  // (Phase 4: synchronous; Phase 5 will add async / detached runs.)
  rpc Start(StartRunRequest) returns (StartRunResponse) {
    option (google.api.http) = {
      post: "/v1/sessions/{session_id}/run"
      body: "*"
    };
  }

  // Tail subscribes to the session's event stream (live + replay).
  // (Phase 4 stub: returns Unimplemented or empty stream until event
  // integration completes in Phase 5.)
  rpc Tail(TailRequest) returns (stream Event) {
    option (google.api.http) = {
      get: "/v1/sessions/{session_id}/events"
    };
  }

  // Restore rolls the session's workspace back to the Nth checkpoint snapshot.
  // The session must not be currently running.
  rpc Restore(RestoreRequest) returns (RestoreResponse) {
    option (google.api.http) = {
      post: "/v1/sessions/{session_id}/restore"
      body: "*"
    };
  }

  // AnswerPermission delivers a yes/no response to a pending permission_ask.
  // delivered=false means the request_id wasn't pending (timed out or unknown).
  rpc AnswerPermission(AnswerPermissionRequest) returns (AnswerPermissionResponse) {
    option (google.api.http) = {
      post: "/v1/sessions/{session_id}/answer_permission"
      body: "*"
    };
  }

  // RequestCompact queues a compaction to run at the next turn boundary
  // for the given session. No-op when no run is in flight (queued=false,
  // reason set so the surface can render a friendly message). Never
  // preempts an in-flight tool call — the runner observes the flag at the
  // top of the next iteration.
  rpc RequestCompact(RequestCompactRequest) returns (RequestCompactResponse) {
    option (google.api.http) = {
      post: "/v1/sessions/{session_id}/request_compact"
      body: "*"
    };
  }

  // PostHint emits a hint event the agent may read on its next turn.
  // The hint shape is opaque key/value (e.g. {"model": "claude-haiku-4-5"}).
  // The agent decides whether to honor it — the server only stages the
  // hint as an extraSystemNote so the next iteration's system prompt
  // includes it once. posted=false when no run is in flight.
  rpc PostHint(PostHintRequest) returns (PostHintResponse) {
    option (google.api.http) = {
      post: "/v1/sessions/{session_id}/hint"
      body: "*"
    };
  }

  // Diff returns the unified diff between the latest shadow-git checkpoint
  // and the current workspace state. For inspection only — does not modify
  // the workspace or the shadow git.
  rpc Diff(DiffRequest) returns (DiffResponse) {
    option (google.api.http) = {
      get: "/v1/sessions/{session_id}/diff"
    };
  }

  // AnswerClarification delivers the user's free-form answer to a pending
  // clarify_requested event raised by the agent's `clarify` tool. The agent
  // loop is paused mid-iteration on a channel; the answer string is fed back
  // as the tool's result content so the model can continue reasoning.
  // delivered=false means the ask_id wasn't pending (already answered, timed
  // out, or never existed).
  rpc AnswerClarification(AnswerClarificationRequest) returns (AnswerClarificationResponse) {
    option (google.api.http) = {
      post: "/v1/sessions/{session_id}/answer_clarification"
      body: "*"
    };
  }
}

message StartRunRequest {
  string session_id = 1;
  string provider = 2;          // "anthropic" | "mock" | "" (server default)
  string model = 3;              // empty → provider default
  bool detach = 4;               // if true, server starts run in background and returns immediately
}

message StartRunResponse {
  string status = 1;             // "done" | "max_iterations" | "error" | "stopped" | "started" (detached only)
  int32  iterations = 2;
  int64  tokens = 3;
  double cost_usd = 4;
  repeated VerifyResult verify_results = 5;
  string error_message = 6;
}

message VerifyResult {
  string name = 1;
  bool   passed = 2;
  int32  exit_code = 3;
  string stdout = 4;
  string stderr = 5;
}

message TailRequest {
  string session_id = 1;
}

message RestoreRequest {
  string session_id = 1;
  // step is 1-indexed: step=1 → oldest checkpoint, step=2 → next, etc.
  // Negative steps count from latest: step=-1 → latest, step=-2 → second latest.
  // step=0 is invalid.
  int32 step = 2;
}

message RestoreResponse {
  string commit_sha     = 1;
  string commit_message = 2;
  int32  total_checkpoints = 3;
}

// PermissionDecision encodes the user's full answer to a permission_ask,
// including persistence intent. The legacy `allow` bool on
// AnswerPermissionRequest carries only the once-tier outcome; clients that
// support persistence (TUI modal) populate `decision` instead so the server
// can record the rule in the per-session list (SESSION) or the on-disk
// PersistentStore (ALWAYS).
//
// When `decision` is UNSPECIFIED the server falls back to `allow` for
// backwards compatibility (existing CLI / e2e clients keep working).
enum PermissionDecision {
  PERMISSION_DECISION_UNSPECIFIED  = 0;
  PERMISSION_DECISION_ALLOW_ONCE   = 1;
  PERMISSION_DECISION_ALLOW_SESSION = 2;
  PERMISSION_DECISION_ALLOW_ALWAYS = 3;
  PERMISSION_DECISION_DENY_ONCE    = 4;
  PERMISSION_DECISION_DENY_SESSION = 5;
  PERMISSION_DECISION_DENY_ALWAYS  = 6;
}

message AnswerPermissionRequest {
  string session_id  = 1;
  string request_id  = 2;
  bool   allow       = 3;  // legacy: ONCE semantics; ignored when `decision` is set
  PermissionDecision decision = 4;  // when non-UNSPECIFIED, takes priority over `allow`
}

message AnswerPermissionResponse {
  bool delivered = 1;  // false when no pending request matches the id (e.g., already timed out)
}

// RequestCompactRequest targets a single session by id.
message RequestCompactRequest {
  string session_id = 1;
}

// RequestCompactResponse reports whether the request was queued for the
// next turn boundary. queued=false carries `reason` (e.g., "no run in
// flight") so the surface can render a friendly message rather than a
// generic error.
message RequestCompactResponse {
  bool   queued = 1;
  string reason = 2;
}

// PostHintRequest carries an opaque key/value hint for the agent's next
// turn. Common keys today: "model" (suggest a model switch). Surfaces and
// agents may add more keys without a wire change.
message PostHintRequest {
  string session_id = 1;
  map<string, string> hint = 2;
}

// PostHintResponse reports whether the hint was staged. posted=false when
// no run is in flight (the hint has nowhere to land).
message PostHintResponse {
  bool   posted = 1;
  string reason = 2;
}

// DiffRequest asks for the diff between the latest shadow-git checkpoint
// and the current workspace state. Future fields (from_step / to_step)
// can extend the comparison to arbitrary commit pairs.
message DiffRequest {
  string session_id = 1;
}

// AnswerClarificationRequest carries the user's free-form answer to a
// pending clarify_requested ask. Empty answer is allowed (the agent treats
// it the same as "no extra info" — same as the timeout path's hint, but
// without the timeout error string).
message AnswerClarificationRequest {
  string session_id = 1;
  string ask_id     = 2;  // matches the ask_id on the clarify_requested event
  string answer     = 3;
}

// AnswerClarificationResponse is symmetric to AnswerPermissionResponse:
// delivered=false on a stale / unknown ask_id is a normal race outcome,
// not an error.
message AnswerClarificationResponse {
  bool delivered = 1;
}

// DiffResponse carries the unified diff body plus summary counts. The
// body is truncated to ~16 KB; when truncated, `truncated=true` and
// `truncated_bytes` reports the number of bytes the server dropped from
// the tail. `note` is a free-form message used when the session has no
// checkpoints yet (the body is then empty and the counts are zero).
message DiffResponse {
  string unified_diff    = 1;
  int32  files_changed   = 2;
  int32  lines_added     = 3;
  int32  lines_removed   = 4;
  bool   truncated       = 5;
  int32  truncated_bytes = 6;
  string note            = 7;
  string checkpoint_sha  = 8;
}
