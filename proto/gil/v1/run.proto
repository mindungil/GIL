syntax = "proto3";

package gil.v1;

import "gil/v1/event.proto";
import "google/api/annotations.proto";

option go_package = "github.com/mindungil/gil/proto/gen/gil/v1;gilv1";

service RunService {
  // Start runs the agent loop synchronously and returns the final result.
  // For long-running runs the client may also Tail to observe progress.
  // (Phase 4: synchronous; Phase 5 will add async / detached runs.)
  rpc Start(StartRunRequest) returns (StartRunResponse) {
    option (google.api.http) = {
      post: "/v1/sessions/{session_id}/run"
      body: "*"
    };
  }

  // Tail subscribes to the session's event stream (live + replay).
  // (Phase 4 stub: returns Unimplemented or empty stream until event
  // integration completes in Phase 5.)
  rpc Tail(TailRequest) returns (stream Event) {
    option (google.api.http) = {
      get: "/v1/sessions/{session_id}/events"
    };
  }

  // Restore rolls the session's workspace back to the Nth checkpoint snapshot.
  // The session must not be currently running.
  rpc Restore(RestoreRequest) returns (RestoreResponse) {
    option (google.api.http) = {
      post: "/v1/sessions/{session_id}/restore"
      body: "*"
    };
  }

  // AnswerPermission delivers a yes/no response to a pending permission_ask.
  // delivered=false means the request_id wasn't pending (timed out or unknown).
  rpc AnswerPermission(AnswerPermissionRequest) returns (AnswerPermissionResponse) {
    option (google.api.http) = {
      post: "/v1/sessions/{session_id}/answer_permission"
      body: "*"
    };
  }
}

message StartRunRequest {
  string session_id = 1;
  string provider = 2;          // "anthropic" | "mock" | "" (server default)
  string model = 3;              // empty → provider default
  bool detach = 4;               // if true, server starts run in background and returns immediately
}

message StartRunResponse {
  string status = 1;             // "done" | "max_iterations" | "error" | "stopped" | "started" (detached only)
  int32  iterations = 2;
  int64  tokens = 3;
  double cost_usd = 4;
  repeated VerifyResult verify_results = 5;
  string error_message = 6;
}

message VerifyResult {
  string name = 1;
  bool   passed = 2;
  int32  exit_code = 3;
  string stdout = 4;
  string stderr = 5;
}

message TailRequest {
  string session_id = 1;
}

message RestoreRequest {
  string session_id = 1;
  // step is 1-indexed: step=1 → oldest checkpoint, step=2 → next, etc.
  // Negative steps count from latest: step=-1 → latest, step=-2 → second latest.
  // step=0 is invalid.
  int32 step = 2;
}

message RestoreResponse {
  string commit_sha     = 1;
  string commit_message = 2;
  int32  total_checkpoints = 3;
}

// PermissionDecision encodes the user's full answer to a permission_ask,
// including persistence intent. The legacy `allow` bool on
// AnswerPermissionRequest carries only the once-tier outcome; clients that
// support persistence (TUI modal) populate `decision` instead so the server
// can record the rule in the per-session list (SESSION) or the on-disk
// PersistentStore (ALWAYS).
//
// When `decision` is UNSPECIFIED the server falls back to `allow` for
// backwards compatibility (existing CLI / e2e clients keep working).
enum PermissionDecision {
  PERMISSION_DECISION_UNSPECIFIED  = 0;
  PERMISSION_DECISION_ALLOW_ONCE   = 1;
  PERMISSION_DECISION_ALLOW_SESSION = 2;
  PERMISSION_DECISION_ALLOW_ALWAYS = 3;
  PERMISSION_DECISION_DENY_ONCE    = 4;
  PERMISSION_DECISION_DENY_SESSION = 5;
  PERMISSION_DECISION_DENY_ALWAYS  = 6;
}

message AnswerPermissionRequest {
  string session_id  = 1;
  string request_id  = 2;
  bool   allow       = 3;  // legacy: ONCE semantics; ignored when `decision` is set
  PermissionDecision decision = 4;  // when non-UNSPECIFIED, takes priority over `allow`
}

message AnswerPermissionResponse {
  bool delivered = 1;  // false when no pending request matches the id (e.g., already timed out)
}
