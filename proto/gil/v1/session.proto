syntax = "proto3";

package gil.v1;

import "google/protobuf/timestamp.proto";
import "google/api/annotations.proto";

option go_package = "github.com/mindungil/gil/proto/gen/gil/v1;gilv1";

message Session {
  string id = 1;
  SessionStatus status = 2;
  google.protobuf.Timestamp created_at = 3;
  google.protobuf.Timestamp updated_at = 4;
  string spec_id = 5;
  string working_dir = 6;
  string goal_hint = 7;
  int64 total_tokens = 8;
  double total_cost_usd = 9;
  // Live snapshot for RUNNING sessions; zero otherwise. Populated by server
  // from in-process run progress; not persisted across restarts.
  int32 current_iteration = 10;
  int64 current_tokens = 11;
}

enum SessionStatus {
  SESSION_STATUS_UNSPECIFIED = 0;
  CREATED = 1;
  INTERVIEWING = 2;
  FROZEN = 3;
  RUNNING = 4;
  AUTO_PAUSED = 5;
  DONE = 6;
  STOPPED = 7;
}

service SessionService {
  rpc Create(CreateRequest) returns (Session) {
    option (google.api.http) = {
      post: "/v1/sessions"
      body: "*"
    };
  }
  rpc Get(GetRequest) returns (Session) {
    option (google.api.http) = {
      get: "/v1/sessions/{id}"
    };
  }
  rpc List(ListRequest) returns (ListResponse) {
    option (google.api.http) = {
      get: "/v1/sessions"
    };
  }
  // Delete removes a session row and (when on-disk) its per-session
  // workspace directory under SessionsDir/<id>. Refuses to delete
  // RUNNING sessions (Aborted / FailedPrecondition) — the caller must
  // stop the run first. NotFound is returned when the id does not
  // exist; idempotent removes (delete twice) deliberately surface as
  // NotFound rather than silently succeeding so the CLI can render an
  // accurate count when batch-deleting.
  rpc Delete(DeleteRequest) returns (DeleteResponse) {
    option (google.api.http) = {
      delete: "/v1/sessions/{id}"
    };
  }
}

message CreateRequest {
  string working_dir = 1;
  string goal_hint = 2;
}

message GetRequest {
  string id = 1;
}

message ListRequest {
  int32 limit = 1;
  string status_filter = 2;
}

message ListResponse {
  repeated Session sessions = 1;
}

message DeleteRequest {
  string id = 1;
}

message DeleteResponse {
  // freed_bytes is the size of the per-session directory that was
  // unlinked (best effort — symlinks/sparse files may be undercounted).
  // Zero when the session had no on-disk artefacts.
  int64 freed_bytes = 1;
}
