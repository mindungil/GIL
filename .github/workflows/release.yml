name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # publish GitHub release + upload assets
  packages: write   # in case we add OCI artifacts later

jobs:
  goreleaser:
    name: goreleaser
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history + tags for changelog

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          check-latest: true

      - name: Install protoc + buf (for any code generation)
        run: |
          go install github.com/bufbuild/buf/cmd/buf@latest

      - name: Tidy modules
        run: make tidy

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Required to push the homebrew formula to mindungil/homebrew-tap.
          # Set this in the repo's Actions secrets; can be a fine-grained
          # PAT scoped to the tap repo.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
